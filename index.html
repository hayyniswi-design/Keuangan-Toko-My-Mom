<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sistem Toko Final</title>
<style>
body{margin:0;font-family:Arial;background:#3b5975;color:#fff}
.page{display:none;padding:20px}
.active{display:block}
.card{background:#fff;color:#000;padding:15px;border-radius:12px;margin:10px 0}
input,select,button{padding:8px;margin:5px;width:100%}
button{cursor:pointer;background:#ffd6e2;border:none}
table{width:100%;background:#fff;color:#000;margin-top:10px;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
.small{font-size:12px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>Login Toko</h2>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="page">
<h2>Dashboard</h2>
<button onclick="logout()">Logout</button>

<div class="card">
<h3>Ringkasan</h3>
<p id="summary"></p>
</div>

<div class="card">
<h3>Tambah Produk</h3>
<input id="pname" placeholder="nama">
<div class="row">
<input id="pqty" type="number" placeholder="qty">
<input id="pbuy" type="number" placeholder="harga beli">
</div>
<input id="psell" type="number" placeholder="harga jual">
<button onclick="addProduct()">Tambah</button>
</div>

<div class="card">
<h3>Produk</h3>
<table>
<thead><tr><th>Nama</th><th>Stok</th><th>Aksi</th></tr></thead>
<tbody id="plist"></tbody>
</table>
</div>

<div class="card">
<h3>Penjualan</h3>
<select id="sellSelect"></select>
<input id="sellQty" type="number" placeholder="qty">
<button onclick="sell()">Jual</button>
</div>

<div class="card">
<h3>Kas Manual</h3>
<input id="kdesc" placeholder="keterangan">
<div class="row">
<input id="kin" type="number" placeholder="masuk">
<input id="kout" type="number" placeholder="keluar">
</div>
<button onclick="addCash()">Simpan Kas</button>
</div>

<div class="card">
<h3>Transaksi</h3>
<table>
<thead><tr><th>Produk</th><th>Qty</th><th>Profit</th></tr></thead>
<tbody id="tlist"></tbody>
</table>
</div>

<div class="card">
<h3>Analisis Produk</h3>
<table>
<thead><tr><th>Produk</th><th>Terjual</th><th>Status</th></tr></thead>
<tbody id="alist"></tbody>
</table>
</div>

<button onclick="exportCSV()">Export CSV</button>

</div>

<script>
let db = JSON.parse(localStorage.getItem("db_toko")) || {
users:{},
products:[],
trx:[],
cash:[]
}
let cur = localStorage.getItem("cur_toko") || ""

function save(){
localStorage.setItem("db_toko",JSON.stringify(db))
}

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function login(){
if(db.users[user.value]==pass.value){
cur=user.value
localStorage.setItem("cur_toko",cur)
show("dash")
render()
}else alert("login gagal")
}

function register(){
db.users[user.value]=pass.value
save()
alert("registered")
}

function logout(){
cur=""
localStorage.removeItem("cur_toko")
show("login")
}

function addProduct(){
db.products.push({
name:pname.value,
qty:+pqty.value,
buy:+pbuy.value,
sell:+psell.value
})
save();render()
}

function sell(){
let p=db.products.find(x=>x.name==sellSelect.value)
let q=+sellQty.value
if(!p||p.qty<q)return alert("stok kurang")
p.qty-=q
db.trx.push({
name:p.name,
qty:q,
profit:(p.sell-p.buy)*q
})
save();render()
}

function addCash(){
db.cash.push({
desc:kdesc.value,
in:+kin.value||0,
out:+kout.value||0
})
save();render()
}

function render(){
plist.innerHTML=db.products.map((p,i)=>
`<tr>
<td>${p.name}</td>
<td>${p.qty}</td>
<td><button onclick="db.products.splice(${i},1);save();render()">X</button></td>
</tr>`).join("")

sellSelect.innerHTML=db.products.map(p=>
`<option>${p.name}</option>`).join("")

tlist.innerHTML=db.trx.map(t=>
`<tr><td>${t.name}</td><td>${t.qty}</td><td>${t.profit}</td></tr>`).join("")

let profit=db.trx.reduce((a,b)=>a+b.profit,0)
let cashIn=db.cash.reduce((a,b)=>a+b.in,0)
let cashOut=db.cash.reduce((a,b)=>a+b.out,0)

summary.innerHTML=`
Profit: ${profit}<br>
Kas Masuk: ${cashIn}<br>
Kas Keluar: ${cashOut}<br>
Saldo: ${profit+cashIn-cashOut}
`

// ANALISIS
let map={}
db.trx.forEach(t=>{
map[t.name]=(map[t.name]||0)+t.qty
})

alist.innerHTML=db.products.map(p=>{
let s=map[p.name]||0
let status=s>10?"Laris":"Normal"
return `<tr><td>${p.name}</td><td>${s}</td><td>${status}</td></tr>`
}).join("")
}

function exportCSV(){
let csv="produk,qty,profit\n"
db.trx.forEach(t=>{
csv+=`${t.name},${t.qty},${t.profit}\n`
})
let a=document.createElement("a")
a.href=URL.createObjectURL(new Blob([csv]))
a.download="laporan.csv"
a.click()
}

if(cur) show("dash")
else show("login")

if(cur) render()
</script>

</body>
</html>
