<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sistem Toko Simple</title>
<style>
body{font-family:Arial;background:#3b5975;color:#fff;margin:0}
.page{display:none;padding:20px}
.active{display:block}
.card{background:#fff;color:#000;padding:15px;border-radius:10px;margin:10px 0}
input,select,button{padding:8px;margin:5px;width:100%}
button{cursor:pointer;background:#ffd6e2;border:none}
table{width:100%;background:#fff;color:#000;margin-top:10px}
th,td{padding:8px;border-bottom:1px solid #ccc}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>Login Toko</h2>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="page">
<h2>Dashboard</h2>
<button onclick="logout()">Logout</button>

<div class="card">
<h3>Tambah Produk</h3>
<input id="pname" placeholder="nama">
<input id="pqty" type="number" placeholder="qty awal">
<input id="pbeli" type="number" placeholder="harga beli">
<input id="pjual" type="number" placeholder="harga jual">
<button onclick="addProduct()">Simpan</button>
</div>

<div class="card">
<h3>Produk</h3>
<table>
<thead><tr><th>Nama</th><th>Stok</th><th>Aksi</th></tr></thead>
<tbody id="plist"></tbody>
</table>
</div>

<div class="card">
<h3>Penjualan</h3>
<select id="sellList"></select>
<input id="sellQty" type="number" placeholder="qty jual">
<button onclick="sell()">Jual</button>
</div>

<div class="card">
<h3>Transaksi</h3>
<table>
<thead><tr><th>Produk</th><th>Qty</th><th>Profit</th></tr></thead>
<tbody id="tlist"></tbody>
</table>
</div>

<div class="card">
<h3>Summary</h3>
<p id="sum"></p>
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("db")) || {users:{},products:[],trx:[]}
let cur = localStorage.getItem("cur") || ""

function save(){localStorage.setItem("db",JSON.stringify(db))}

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function login(){
let u=user.value,p=pass.value
if(db.users[u]&&db.users[u]===p){
cur=u
localStorage.setItem("cur",u)
show("dash")
render()
}else alert("salah")
}

function register(){
db.users[user.value]=pass.value
save()
alert("daftar oke")
}

function logout(){
cur=""
localStorage.removeItem("cur")
show("login")
}

function addProduct(){
db.products.push({
name:pname.value,
qty:+pqty.value,
buy:+pbeli.value,
sell:+pjual.value
})
save()
render()
}

function sell(){
let p=db.products.find(x=>x.name==sellList.value)
let q=+sellQty.value
if(!p||p.qty<q)return alert("stok kurang")
p.qty-=q
db.trx.push({
name:p.name,
qty:q,
profit:(p.sell-p.buy)*q
})
save()
render()
}

function render(){
plist.innerHTML=db.products.map((p,i)=>
`<tr>
<td>${p.name}</td>
<td>${p.qty}</td>
<td><button onclick="db.products.splice(${i},1);save();render()">hapus</button></td>
</tr>`).join("")

sellList.innerHTML=db.products.map(p=>
`<option>${p.name}</option>`).join("")

tlist.innerHTML=db.trx.map(t=>
`<tr><td>${t.name}</td><td>${t.qty}</td><td>${t.profit}</td></tr>`).join("")

let total=db.trx.reduce((a,b)=>a+b.profit,0)
sum.innerText="Total Profit: "+total
}

if(cur) show("dash")
else show("login")

if(cur) render()
</script>

</body>
</html>
